<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test Tabs</title>
<style>
  body { font-family: sans-serif; padding: 30px; background: #c8e89f; }
  .login-box { max-width: 360px; background: #fff5e1; padding: 22px; border: 4px solid #d4a04a; border-radius: 24px; margin: 0 auto; }
  .login-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .login-tab { flex: 1; padding: 8px; background: #fff; border: 2px solid #d4a04a; border-radius: 10px; font-weight: 700; cursor: pointer; }
  .login-tab.active { background: linear-gradient(180deg, #ffd700, #ff9b1c); }
  input { width: 100%; padding: 11px; margin-bottom: 8px; border: 2px solid #d4a04a; border-radius: 10px; box-sizing: border-box; }
  .login-btn { width: 100%; padding: 12px; background: #5cb831; color: #fff; border: 2px solid #fff; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; }
</style>
</head>
<body>
  <div class="login-box">
    <h1 style="text-align:center;color:#c2410c">PORCANA GREEN - TEST</h1>
    <div class="login-tabs">
      <button class="login-tab active" id="t1" onclick="document.getElementById('f1').style.display='block';document.getElementById('f2').style.display='none';document.getElementById('t1').classList.add('active');document.getElementById('t2').classList.remove('active')">Iniciar sesión</button>
      <button class="login-tab" id="t2" onclick="document.getElementById('f2').style.display='block';document.getElementById('f1').style.display='none';document.getElementById('t2').classList.add('active');document.getElementById('t1').classList.remove('active')">Registrarse</button>
    </div>
    <div id="f1" style="display:block">
      <input type="email" placeholder="Correo electrónico">
      <input type="password" placeholder="Contraseña">
      <button class="login-btn">Entrar a la granja 🚜</button>
    </div>
    <div id="f2" style="display:none">
      <input type="text" placeholder="Tu nombre">
      <input type="email" placeholder="Correo electrónico">
      <input type="password" placeholder="Contraseña">
      <input type="text" placeholder="Código (opcional)">
      <button class="login-btn">Crear granja 🌱</button>
    </div>
  </div>
  <p style="text-align:center;margin-top:20px;color:#5c2c0a">Si esto funciona (al darle 'Registrarse' aparecen 4 campos), el problema no es el HTML.</p>
</body>
</html>
